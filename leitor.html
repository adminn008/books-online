<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA | Reader</title>
    <style>
        body { background: #050505; color: #ccc; font-family: 'Inter', serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .nav-top { padding: 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        #conteudo { flex: 1; padding: 40px; max-width: 600px; margin: 0 auto; line-height: 1.8; font-size: 1.2rem; animation: fadeIn 0.5s; }
        .controles { padding: 30px; display: flex; justify-content: center; gap: 40px; border-top: 1px solid #111; }
        button { background: none; border: 1px solid #333; color: #fff; padding: 10px 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }
        #num-pagina { color: #555; font-size: 0.8rem; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="nav-top">
    <span id="titulo-livro" style="color:#fff; font-weight:bold;"></span>
    <a href="index.html" style="color:#666; text-decoration:none;">FECHAR</a>
</div>

<div id="conteudo"></div>

<div class="controles">
    <button onclick="voltar()">ANTERIOR</button>
    <div id="num-pagina"></div>
    <button onclick="proximo()">PRÓXIMA</button>
</div>

<script type="module">
    // 1. Pega o ID do livro que você salvou no LocalStorage ao clicar na index
    const livroId = localStorage.getItem('livro_atual'); 
    let currentBook = null;
    let currentPage = 0;

    async function carregarLivro() {
        try {
            // 2. A MÁGICA: Ele importa apenas o arquivo do livro clicado
            const modulo = await import(`./livros/${livroId}.js`);
            currentBook = modulo.dados;
            renderizar();
        } catch (err) {
            console.error("Erro ao carregar o livro:", err);
            alert("Arquivo do livro não encontrado!");
        }
    }

    function renderizar() {
        const body = document.getElementById('read-body');
        document.getElementById('read-title').innerText = currentBook.title;
        
        body.style.opacity = 0;
        setTimeout(() => {
            body.innerHTML = `<p>${currentBook.pages[currentPage]}</p>`;
            body.style.opacity = 1;
            document.querySelector('.reader-content').scrollTop = 0;
        }, 200);

        document.getElementById('page-info').innerText = `PÁGINA ${currentPage + 1} DE ${currentBook.pages.length}`;
        document.getElementById('prevBtn').disabled = (currentPage === 0);
        document.getElementById('nextBtn').disabled = (currentPage === currentBook.pages.length - 1);
    }

    // Funções globais para os botões funcionarem com type="module"
    window.changePage = (direction) => {
        currentPage += direction;
        renderizar();
    };

    window.closeBook = () => {
        window.location.href = 'index.html';
    };

    if (livroId) carregarLivro();
</script>

</body>
</html>
