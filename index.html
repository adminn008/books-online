<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA | Type Generator</title>
    <style>
        :root { --bg: #050505; --accent: #ffffff; --card: #111; --sub: #444; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { letter-spacing: 12px; font-weight: 300; text-transform: uppercase; margin: 0; font-size: 2rem; }
        p { color: var(--sub); font-size: 0.7rem; letter-spacing: 3px; margin-top: 10px; }

        input { width: 100%; max-width: 500px; background: #000; border: 1px solid #222; padding: 20px; color: #fff; border-radius: 4px; outline: none; font-size: 1rem; text-align: center; transition: 0.3s; margin-bottom: 40px; }
        input:focus { border-color: var(--accent); }

        .results { width: 100%; max-width: 500px; display: grid; gap: 15px; }
        .font-card { background: var(--card); border: 1px solid #1a1a1a; padding: 20px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .font-card:hover { border-color: #444; background: #161616; }
        .font-card span { font-size: 1.1rem; }
        .copy-tag { font-size: 0.6rem; color: #333; text-transform: uppercase; letter-spacing: 1px; }

        footer { margin-top: 60px; color: #1a1a1a; font-size: 0.6rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>AETERNA</h1>
        <p>TYPE GENERATOR // LOW PROFILE</p>
    </header>

    <input type="text" id="userInput" placeholder="ESCREVA ALGO..." oninput="generate()">

    <div class="results" id="output">
        </div>

    <footer>ESTABLISHED 2026 // CURITIBA - PR</footer>

    <script>
        const maps = {
            gothic: { 'a':'рЭФЮ','b':'рЭФЯ','c':'рЭФ†','d':'рЭФ°','e':'рЭФҐ','f':'рЭФ£','g':'рЭФ§','h':'рЭФ•','i':'рЭФ¶','j':'рЭФІ','k':'рЭФ®','l':'рЭФ©','m':'рЭФ™','n':'рЭФЂ','o':'рЭФђ','p':'рЭФ≠','q':'рЭФЃ','r':'рЭФѓ','s':'рЭФ∞','t':'рЭФ±','u':'рЭФ≤','v':'рЭФ≥','w':'рЭФі','x':'рЭФµ','y':'рЭФґ','z':'рЭФЈ' },
            spaced: { 'a':'пљБ','b':'пљВ','c':'пљГ','d':'пљД','e':'пљЕ','f':'пљЖ','g':'пљЗ','h':'пљИ','i':'пљЙ','j':'пљК','k':'пљЛ','l':'пљМ','m':'пљН','n':'пљО','o':'пљП','p':'пљР','q':'пљС','r':'пљТ','s':'пљУ','t':'пљФ','u':'пљХ','v':'пљЦ','w':'пљЧ','x':'пљШ','y':'пљЩ','z':'пљЪ' },
            small: { 'a':'бµГ','b':'бµЗ','c':'бґЬ','d':'бµИ','e':'бµЙ','f':'бґ†','g':'бµН','h':' ∞','i':'вБ±','j':' ≤','k':'бµП','l':'Ћ°','m':'бµР','n':'вБњ','o':'бµТ','p':'бµЦ','q':'бµ†','r':' ≥','s':'ЋҐ','t':'бµЧ','u':'бµШ','v':'бµЫ','w':' Ј','x':'Ћ£','y':' Є','z':'бґї' }
        };

        function convert(text, map) {
            return text.toLowerCase().split('').map(char => map[char] || char).join('');
        }

        function generate() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            if(!input) return;

            const styles = [
                { name: 'GOTHIC', val: convert(input, maps.gothic) },
                { name: 'SPACED', val: convert(input, maps.spaced) },
                { name: 'SMALL CAPS', val: convert(input, maps.small) },
                { name: 'MINIMAL', val: input.split('').join(' ¬Ј ') }
            ];

            styles.forEach(s => {
                const div = document.createElement('div');
                div.className = 'font-card';
                div.onclick = () => copyText(s.val);
                div.innerHTML = `<span>${s.val}</span><span class="copy-tag">Click to Copy</span>`;
                output.appendChild(div);
            });
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            alert("Copiado: " + txt);
        }
    </script>
</body>
</html>
