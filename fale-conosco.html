<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AETERNA | Contact Support</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #1a1a1a; background: #080808; }
        h1 { font-family: 'Cinzel'; letter-spacing: 10px; font-size: 1.5rem; margin-bottom: 30px; text-align: center; }
        p { font-size: 0.8rem; color: #555; line-height: 1.6; margin-bottom: 30px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #fff; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
        button:hover { background: #ccc; }
        .back { display: block; text-align: center; margin-top: 20px; color: #333; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtMFYHMakcPHR6HPfHK7Na54RKsCqzWPc",
    authDomain: "chat-anonimo-a9076.firebaseapp.com",
    databaseURL: "https://chat-anonimo-a9076-default-rtdb.firebaseio.com",
    projectId: "chat-anonimo-a9076",
    storageBucket: "chat-anonimo-a9076.firebasestorage.app",
    messagingSenderId: "1098662627081",
    appId: "1:1098662627081:web:80f095fab4835c23e4b5d8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  document.getElementById('contactForm').addEventListener('submit', (e) => {
    e.preventDefault();
    
    const nome = document.getElementById('nome').value;
    const mensagem = document.getElementById('mensagem').value;

    push(ref(db, 'mensagens'), {
      remetente: nome,
      texto: mensagem,
      timestamp: serverTimestamp()
    }).then(() => {
      alert("Mensagem enviada com sucesso!");
      document.getElementById('contactForm').reset();
    }).catch((error) => {
      alert("Erro ao enviar: " + error.message);
    });
  });
</script>

    </div>
</body>
</html>
