<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AETERNA | Contact Support</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #1a1a1a; background: #080808; }
        h1 { font-family: 'Cinzel'; letter-spacing: 10px; font-size: 1.5rem; margin-bottom: 30px; text-align: center; }
        p { font-size: 0.8rem; color: #555; line-height: 1.6; margin-bottom: 30px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #fff; }
        button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
        button:hover { background: #ccc; }
        .back { display: block; text-align: center; margin-top: 20px; color: #333; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>CONTACT</h1>
        <p>Para dúvidas sobre parcerias, suporte técnico ou sugestões de novas fontes tipográficas para o arquivo Aeterna, utilize o formulário abaixo. Retornamos em até 48 horas úteis.</p>
        <form action="#">
            <input type="text" placeholder="SEU NOME" required>
            <input type="email" placeholder="SEU E-MAIL" required>
            <textarea rows="5" placeholder="SUA MENSAGEM" required></textarea>
            <button type="submit">ENVIAR ARQUIVO</button>
        </form>
        <a href="index.html" class="back">VOLTAR AO ARQUIVO</a>
    </div>
</body>
</html>
